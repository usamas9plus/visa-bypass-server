<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vecna License Admin v1.1.0</title>
    <link rel="stylesheet" href="/admin/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Login Screen -->
    <div id="login-screen" class="screen">
        <div class="login-container">
            <div class="login-card">
                <div class="logo">
                    <div class="logo-icon">🔐</div>
                    <h1>Vecna Admin</h1>
                    <p>License Management System v1.1.0</p>
                </div>
                <form id="login-form">
                    <div class="input-group">
                        <label for="password">Admin Password</label>
                        <input type="password" id="password" placeholder="Enter admin password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">
                        <span>Login</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7" />
                        </svg>
                    </button>
                </form>
                <div id="login-error" class="error-message"></div>
            </div>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard-screen" class="screen hidden">
        <nav class="navbar">
            <div class="nav-brand">
                <span class="nav-logo">🔐</span>
                <span class="nav-title">Vecna Admin <small style="font-size: 0.6em; color: #888; margin-left: 5px;">v1.1.0</small></span>
            </div>
            <button id="logout-btn" class="btn btn-ghost">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16,17 21,12 16,7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                <span>Logout</span>
            </button>
        </nav>

        <main class="container">
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon total">📊</div>
                    <div class="stat-content">
                        <div class="stat-value" id="stat-total">0</div>
                        <div class="stat-label">Total Keys</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon active">✅</div>
                    <div class="stat-content">
                        <div class="stat-value" id="stat-active">0</div>
                        <div class="stat-label">Active</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon expired">⏰</div>
                    <div class="stat-content">
                        <div class="stat-value" id="stat-expired">0</div>
                        <div class="stat-label">Expired</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon revoked">🚫</div>
                    <div class="stat-content">
                        <div class="stat-value" id="stat-revoked">0</div>
                        <div class="stat-label">Revoked</div>
                    </div>
                </div>
            </div>

            <!-- Global Settings -->
            <div class="card settings-card">
                <h2>Global Settings</h2>
                <form id="settings-form" class="create-form">
                    <div class="form-row">
                        <div class="input-group">
                            <label for="latest-version">Latest Version (Prod)</label>
                            <input type="text" id="latest-version" placeholder="e.g. 1.0.2">
                        </div>
                        <button type="submit" class="btn btn-secondary">Save</button>
                    </div>
                </form>
            </div>

            <!-- Create -->
            <div class="card create-key-card">
                <h2>Create New License</h2>
                <form id="create-key-form" class="create-form">
                    <div class="form-row">
                        <div class="input-group">
                            <label for="key-label">Label</label>
                            <input type="text" id="key-label">
                        </div>
                        <button type="submit" class="btn btn-primary">Generate</button>
                    </div>
                </form>
            </div>

            <!-- Table -->
            <div class="card keys-card">
                <div class="card-header">
                    <h2>License Keys</h2>
                    <button id="refresh-keys" class="btn btn-ghost btn-sm">Refresh</button>
                </div>
                <div class="table-container">
                    <table class="keys-table">
                        <thead>
                            <tr>
                                <th>Key</th>
                                <th>Label</th>
                                <th>Status</th>
                                <th>Devices</th>
                                <th>Restr.</th>
                                <th>Auto-Ban</th>
                                <th>Actions</th>
                                <th>Expires</th>
                                <th>Last Seen</th>
                            </tr>
                        </thead>
                        <tbody id="keys-tbody">
                            <tr class="loading-row">
                                <td colspan="10">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <!-- FORCED CACHE BREAK v1.1.0 -->
    <script src="/admin/dashboard_v2.js?v=1.1.0"></script>
</body>

</html>
